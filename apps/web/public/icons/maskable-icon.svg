<!-- Maskable icon : safe zone = centre 80% du canvas (zone blanche) -->
<!-- Le fond vert couvre toute l'icône y compris les bords de découpe -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#1A6B3A"/>
  <!-- Lettre centrée dans la safe zone (≈ 82px de marge sur chaque côté) -->
  <text
    x="256" y="330"
    font-family="Arial, sans-serif"
    font-weight="900"
    font-size="240"
    fill="white"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-8"
  >V</text>
</svg>
