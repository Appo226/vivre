# ─── VIVRE Nginx — HTTP (initial deployment, no SSL yet) ──────────────────────
# Pour activer HTTPS plus tard :
#   1. Pointer le domaine vivre.bf → 144.24.145.12
#   2. Lancer : docker compose run certbot certonly --webroot -w /var/www/certbot -d vivre.bf
#   3. Remplacer ce fichier par nginx/vivre-ssl.conf

upstream api {
    server api:3001;
    keepalive 64;
}

upstream web {
    server web:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Fichiers statiques Next.js — cache permanent
    location /_next/static/ {
        proxy_pass http://web;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Service Worker et manifest PWA — pas de cache
    location ~* \.(sw\.js|manifest\.json|firebase-config\.js)$ {
        proxy_pass http://web;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # WebSocket — Socket.IO
    location /socket.io/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # API REST
    location /v1/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Application Next.js
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
