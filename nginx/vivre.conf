upstream api {
    server api:3001;
    keepalive 64;
}

upstream web {
    server web:3000;
    keepalive 64;
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name vivre.bf www.vivre.bf api.vivre.bf;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Web — vivre.bf + www.vivre.bf ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name vivre.bf www.vivre.bf;

    ssl_certificate     /etc/letsencrypt/live/vivre.bf/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vivre.bf/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Fichiers statiques Next.js — cache permanent
    location /_next/static/ {
        proxy_pass http://web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Service Worker et manifeste PWA — pas de cache
    location ~* \.(sw\.js|manifest\.json|firebase-config\.js)$ {
        proxy_pass http://web;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # WebSocket — Socket.IO
    location /socket.io/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API REST
    location /v1/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # CORS géré par Fastify — pas de duplication ici
    }

    # Application Next.js
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── API — api.vivre.bf ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.vivre.bf;

    ssl_certificate     /etc/letsencrypt/live/vivre.bf/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vivre.bf/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location /socket.io/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
