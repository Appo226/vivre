
# render.yaml — VIVRE infrastructure on Render.com
#
# Services:
#   vivre-api    — Fastify REST + WebSocket  (free web service)
#   vivre-web    — Next.js PWA               (free web service)
#   vivre-db     — PostgreSQL                (free 90-day database)
#   vivre-redis  — Redis                     (free Redis instance)
#
# After first deploy, set the secret env vars listed at the bottom
# of each service definition in the Render dashboard.

databases:
  - name: vivre-db
    databaseName: vivre_prod
    user: vivre_user
    plan: free
    ipAllowList: []          # allow connections from Render services only

services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: vivre-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []          # allow connections from Render services only

  # ── API ─────────────────────────────────────────────────────────────────────
  - type: web
    name: vivre-api
    env: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /v1/health
    autoDeploy: true
    # Run migrations before new version goes live (zero-downtime)
    preDeployCommand: prisma migrate deploy

    envVars:
      # ── Injected automatically by Render ──────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: vivre-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          name: vivre-redis
          type: redis
          property: connectionString

      # ── Static config ─────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      # ── Set these manually in the Render dashboard after first deploy ──────
      #
      #  JWT_SECRET               openssl rand -hex 64
      #  JWT_REFRESH_SECRET       openssl rand -hex 64
      #  CINETPAY_API_KEY         from cinetpay.com
      #  CINETPAY_SITE_ID         from cinetpay.com
      #  TWILIO_ACCOUNT_SID       from twilio.com
      #  TWILIO_AUTH_TOKEN        from twilio.com
      #  TWILIO_PHONE_NUMBER      your Twilio number (+1…)
      #  ANTHROPIC_API_KEY        from console.anthropic.com
      #  FIREBASE_STORAGE_BUCKET  yourproject.appspot.com
      #  FIREBASE_SERVICE_ACCOUNT_JSON  base64-encoded service account JSON

  # ── Web (Next.js) ────────────────────────────────────────────────────────────
  - type: web
    name: vivre-web
    env: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      # Render auto-assigns https://{service-name}.onrender.com
      # so we can hard-code the API URL here.
      - key: NEXT_PUBLIC_API_URL
        value: https://vivre-api-ndmq.onrender.com/v1

      # ── Set these manually after first deploy ─────────────────────────────
      #
      #  NEXT_PUBLIC_FIREBASE_API_KEY
      #  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      #  NEXT_PUBLIC_FIREBASE_PROJECT_ID
      #  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      #  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      #  NEXT_PUBLIC_FIREBASE_APP_ID
      #  NEXT_PUBLIC_FIREBASE_VAPID_KEY
