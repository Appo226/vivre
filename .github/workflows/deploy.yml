name: CI — Build & verify

# Render auto-deploys from GitHub on push to main.
# This workflow just validates the build still compiles cleanly
# so broken code never reaches Render.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @vivre/database run generate

      - name: Build packages
        run: |
          pnpm --filter @vivre/types    run build
          pnpm --filter @vivre/utils    run build
          pnpm --filter @vivre/database run build

      - name: Typecheck all apps
        run: pnpm typecheck
